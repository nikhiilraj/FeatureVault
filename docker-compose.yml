# FeatureVault — Development
# Usage: docker compose up -d
# Dashboard: http://localhost:3000
# API:       http://localhost:4000

services:
  postgres:
    image: postgres:16-alpine
    container_name: fv-postgres-dev
    environment:
      POSTGRES_USER:     featurevault
      POSTGRES_PASSWORD: secret
      POSTGRES_DB:       featurevault
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U featurevault"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fv-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5



volumes:
  postgres_dev_data:
  redis_dev_data:
