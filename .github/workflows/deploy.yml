name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

# Prevent concurrent deploys
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production  # requires approval if configured

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/featurevault.pem
          chmod 600 ~/.ssh/featurevault.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/featurevault.pem -o StrictHostKeyChecking=no \
            $EC2_USER@$EC2_HOST << 'REMOTE'
            set -euo pipefail
            cd /home/ec2-user/featurevault

            echo "📦 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔨 Building containers..."
            docker compose -f docker-compose.prod.yml build --no-cache api web

            echo "🗃  Running migrations..."
            source .env.production
            docker compose -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}" \
              api node apps/api/dist/lib/db/migrate.js

            echo "🚀 Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "⏳ Waiting for health checks..."
            sleep 15

            echo "🔍 Health check..."
            curl -sf http://localhost:4000/health || (echo "❌ Health check failed" && exit 1)

            echo "🧹 Cleanup..."
            docker image prune -f

            echo "✅ Deploy complete at $(date)"
          REMOTE

      - name: Notify success
        if: success()
        run: |
          echo "Deploy succeeded at $(date)"
          # Add Slack notification here if desired

      - name: Notify failure
        if: failure()
        run: |
          echo "Deploy FAILED at $(date)"
          # Add Slack notification here if desired
