name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/featurevault.pem
          chmod 600 ~/.ssh/featurevault.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/featurevault.pem $EC2_USER@$EC2_HOST 'bash -s' << 'REMOTE'
            set -euo pipefail
            cd /home/ec2-user/featurevault

            echo "📦 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔨 Building containers..."
            set -a && source .env.production && set +a
            docker compose -f docker-compose.prod.yml build --no-cache api web

            echo "🚀 Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "⏳ Waiting for health checks..."
            sleep 20

            echo "🗃  Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T api \
              sh -c "cd apps/api && node dist/lib/db/migrate.js"

            echo "🔍 Health check..."
            curl -sf http://localhost:4000/health || (echo "❌ Health check failed" && exit 1)

            echo "🧹 Cleanup..."
            docker image prune -f

            echo "✅ Deploy complete at $(date)"
          REMOTE
