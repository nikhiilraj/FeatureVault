name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     featurevault
          POSTGRES_PASSWORD: ci_secret
          POSTGRES_DB:       featurevault_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL:  postgresql://featurevault:ci_secret@localhost:5432/featurevault_test
      REDIS_URL:     redis://localhost:6379
      COOKIE_SECRET: ci_cookie_secret_that_is_long_enough_32chars
      NODE_ENV:      test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate JWT keys
        run: |
          mkdir -p apps/api/keys
          openssl genrsa -out apps/api/keys/private.pem 2048
          openssl rsa -in apps/api/keys/private.pem -pubout -out apps/api/keys/public.pem

      - name: Run migrations
        run: |
          cd apps/api
          pnpm db:migrate

      - name: Typecheck — API
        run: cd apps/api && pnpm typecheck

      - name: Typecheck — Web
        run: cd apps/web && pnpm typecheck

      - name: Typecheck — SDK
        run: cd packages/sdk && pnpm typecheck

      - name: Run all tests
        run: pnpm test

      - name: Build SDK
        run: cd packages/sdk && pnpm build
