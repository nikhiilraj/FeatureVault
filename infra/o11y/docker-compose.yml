services:
  prometheus:
    image: prom/prometheus:latest
    container_name: o11y-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:latest
    container_name: o11y-tempo
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200" # UI port
      - "4318:4318" # OTLP HTTP port exactly where our api sends it

  grafana:
    image: grafana/grafana:latest
    container_name: o11y-grafana
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      # Inject the auto-provisioning configs
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Drop your JSON dashboards directly into the container folder
      - ../:/etc/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
