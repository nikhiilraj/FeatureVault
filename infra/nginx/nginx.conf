# FeatureVault — Production Nginx config
# Managed by Certbot for TLS — do not edit TLS blocks manually

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain application/json application/javascript text/css;

  # Security headers (applied globally)
  add_header X-Frame-Options           DENY always;
  add_header X-Content-Type-Options    nosniff always;
  add_header X-XSS-Protection          "1; mode=block" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=global:10m  rate=120r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
  limit_req_zone $binary_remote_addr zone=sdk:10m     rate=300r/m;

  # Upstreams
  upstream api_backend {
    server 127.0.0.1:4000;
    keepalive 32;
  }

  upstream web_backend {
    server 127.0.0.1:3000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ───────────────────────────────────
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Main HTTPS server ────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name YOUR_DOMAIN_HERE;

    # TLS — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── SDK WebSocket ────────────────────────────────────────
    location /sdk/v1/ws {
      limit_req zone=sdk burst=50 nodelay;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
    }

    # ── SDK REST ──────────────────────────────────────────────
    location /sdk/ {
      limit_req zone=sdk burst=100 nodelay;
      proxy_pass http://api_backend;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth endpoints (stricter rate limit) ──────────────────
    location /v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api_backend;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API ───────────────────────────────────────────────────
    location /v1/ {
      limit_req zone=global burst=30 nodelay;
      proxy_pass http://api_backend;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check ──────────────────────────────────────────
    location /health {
      proxy_pass http://api_backend;
      access_log off;
    }

    # ── Dashboard (Next.js) ───────────────────────────────────
    location / {
      proxy_pass http://web_backend;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Next.js HMR WebSocket (dev only — remove in prod)
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
