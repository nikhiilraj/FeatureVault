server:
  log_level: info

metrics:
  global:
    scrape_interval: 15s
  configs:
    - name: featurevault
      scrape_configs:
        - job_name: 'featurevault-api'
          metrics_path: '/metrics'
          static_configs:
            - targets: ['api:4000']
      remote_write:
        - url: ${GRAFANA_CLOUD_PROMETHEUS_URL}
          basic_auth:
            username: ${GRAFANA_CLOUD_USERNAME}
            password: ${GRAFANA_CLOUD_API_KEY}

logs:
  configs:
    - name: featurevault_logs
      clients:
        - url: ${GRAFANA_CLOUD_LOKI_URL}
          basic_auth:
            username: ${GRAFANA_CLOUD_LOKI_USERNAME}
            password: ${GRAFANA_CLOUD_API_KEY}
      positions:
        filename: /tmp/positions.yaml
      scrape_configs:
        - job_name: 'docker_containers'
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 15s
          relabel_configs:
            - source_labels: ['__meta_docker_container_name']
              regex: '/(.*)'
              target_label: 'container'
            - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
              target_label: 'service'

traces:
  configs:
    - name: featurevault_traces
      remote_write:
        - endpoint: ${GRAFANA_CLOUD_TEMPO_ENDPOINT}
          basic_auth:
            username: ${GRAFANA_CLOUD_TEMPO_USERNAME}
            password: ${GRAFANA_CLOUD_API_KEY}
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
